    <script>
        $(function () {
            // 1. 拔除 Bootstrap 原生的 data-toggle
            $('.FBnavbar .nav-item.dropdown > a').removeAttr('data-toggle');

            // 2. 點擊控制 (手機版選單展開/收縮)
            $('.FBnavbar .nav-item.dropdown > a').on('click', function (e) {
                if ($(window).width() <= 767) {
                    e.preventDefault();

                    var $parent = $(this).parent('.dropdown');
                    var isAlreadyOpen = $parent.hasClass('show');

                    $('.FBnavbar .dropdown').removeClass('show');

                    if (!isAlreadyOpen) {
                        $parent.addClass('show');
                    }
                }
            });

            // 3. 滾動自動收起 (手機版選單)
            $(window).on('scroll', function () {
                if ($(window).width() <= 767) {
                    var scrollTop = $(this).scrollTop();
                    var triggerHeight = $(window).height() / 3;

                    if (scrollTop > triggerHeight) {
                        $('.FBnavbar .dropdown').removeClass('show');
                    }
                }
            });
        });

        // 4. PC 版錨點平滑滾動處理 (移除 iframe 邏輯)
        // 這裡只會監聽帶有 data-target 的元素，手機版的 href="#nav04" 不受此 JS 影響
        $(document).on('click', '.nav-link[data-target]', function (e) {

            e.preventDefault(); // 預防網址跳轉

            var target = $(this).data('target');
            var $target = $(target);

            if (!$target.length) return;

            $('html, body').animate({
                scrollTop: $target.offset().top - 80
            }, 500);
        });
    </script>
